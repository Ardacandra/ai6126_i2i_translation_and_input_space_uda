seed: 42
device: auto

dataset:
  root: dataset

output:
  root: out/experiments

methods:
  - spatial
  - spectral

pairs:
  - name: mnist_to_usps
    source: MNIST
    target: USPS
  - name: svhn_to_mnist
    source: SVHN
    target: MNIST
  - name: amazon_to_webcam
    source: Amazon
    target: Webcam
  - name: art_to_real_world
    source: Art
    target: Real-World
  - name: photo_to_sketch
    source: Photo
    target: Sketch

training:
  image_size: 128
  batch_size: 8
  num_workers: 4
  epochs: 30
  steps_per_epoch: 400
  lr: 0.00010
  betas: [0.5, 0.999]
  lambda_cycle: 10.0
  lambda_identity: 5.0
  spectral_low_freq_ratio: 0.2
  spectral_color_mode: auto  # options: auto, grayscale, rgb
  save_every_epochs: 10
  sample_every_epochs: 5
  sample_count: 8
  use_amp: true
