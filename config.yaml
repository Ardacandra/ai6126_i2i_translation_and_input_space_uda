seed: 42
device: auto

dataset:
  root: dataset

output:
  root: out/experiments

qualitative:
  # Global fallback for qualitative export:
  # shared key applies to both methods unless method-specific keys are set
  checkpoint_epoch: null
  checkpoint_epoch_spatial: null
  checkpoint_epoch_spectral: null

uda_output:
  root: out/uda_results

# Directory where Task I CycleGAN checkpoints live
# (e.g. out/experiments/mnist_to_usps/spatial/checkpoints/epoch_030.pt)
cyclegan_output_root: out/experiments

methods:
  - spatial
  - spectral

pairs:
  - name: mnist_to_usps
    source: MNIST
    target: USPS
    qualitative_checkpoint_epoch_spatial: 100
    qualitative_checkpoint_epoch_spectral: 10
  - name: svhn_to_mnist
    source: SVHN
    target: MNIST
    qualitative_checkpoint_epoch_spatial: 100
    qualitative_checkpoint_epoch_spectral: 40
  - name: amazon_to_webcam
    source: Amazon
    target: Webcam
    qualitative_checkpoint_epoch_spatial: 100
    qualitative_checkpoint_epoch_spectral: 40
  - name: art_to_real_world
    source: Art
    target: Real-World
    qualitative_checkpoint_epoch_spatial: 40
    qualitative_checkpoint_epoch_spectral: 10
  - name: photo_to_sketch
    source: Photo
    target: Sketch
    qualitative_checkpoint_epoch_spatial: 100
    qualitative_checkpoint_epoch_spectral: 20

training:
  image_size: 128
  batch_size: 8
  num_workers: 4
  epochs: 100
  steps_per_epoch: 100
  lr: 0.0002
  betas: [0.5, 0.999]
  lambda_cycle: 10.0
  lambda_identity: 5.0
  spectral_low_freq_ratio: 0.1
  spectral_color_mode: auto  # options: auto, grayscale, rgb
  save_every_epochs: 10
  sample_every_epochs: 10
  sample_count: 8
  use_amp: true

# Task II: methods to benchmark
uda_methods:
  - source_only
  - cyclegan
  - spectral_cyclegan
  - cycada
  - fda

# Task II: classifier training config
classifier_training:
  image_size: 128
  batch_size: 32
  num_workers: 4
  epochs: 30
  steps_per_epoch: 300
  lr: 0.001
  weight_decay: 0.0001
  use_amp: true
  pretrained_backbone: true

fda:
  # Low-frequency ratio for amplitude swap (beta in the FDA paper)
  beta: 0.1

cycada:
  # Weight on the feature-level domain adversarial loss
  lambda_domain: 0.1